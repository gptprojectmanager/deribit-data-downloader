services:
  deribit-sync:
    build: .
    volumes:
      - /media/sam/2TB-NVMe/data/deribit_options:/data/deribit_options
    environment:
      - DERIBIT_CATALOG_PATH=/data/deribit_options
      - DERIBIT_COMPRESSION=zstd
      - TZ=Europe/Lisbon
    command: sync --currency BTC

  deribit-sync-eth:
    build: .
    volumes:
      - /media/sam/2TB-NVMe/data/deribit_options:/data/deribit_options
    environment:
      - DERIBIT_CATALOG_PATH=/data/deribit_options
      - DERIBIT_COMPRESSION=zstd
      - TZ=Europe/Lisbon
    command: sync --currency ETH

  # Keep backfill services for manual use
  backfill-btc:
    build: .
    profiles: ["backfill"]
    volumes:
      - /media/sam/2TB-NVMe/data/deribit_options:/data/deribit_options
      - deribit-checkpoints:/checkpoints
    environment:
      - DERIBIT_CATALOG_PATH=/data/deribit_options
      - DERIBIT_CHECKPOINT_DIR=/checkpoints
    command: backfill --currency BTC --resume

  backfill-eth:
    build: .
    profiles: ["backfill"]
    volumes:
      - /media/sam/2TB-NVMe/data/deribit_options:/data/deribit_options
      - deribit-checkpoints:/checkpoints
    environment:
      - DERIBIT_CATALOG_PATH=/data/deribit_options
      - DERIBIT_CHECKPOINT_DIR=/checkpoints
    command: backfill --currency ETH --resume

volumes:
  deribit-checkpoints:
    driver: local
