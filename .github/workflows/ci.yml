name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, X64, muletto]]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Type check with mypy
        run: uv run mypy src/

      - name: Run tests with coverage
        id: coverage
        run: |
          uv run pytest tests/ -v --cov=src/deribit_data --cov-report=term --cov-report=json --cov-report=xml:coverage.xml
          TOTAL=$(uv run python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered_display']))")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"


      - name: Upload coverage to Codecov
        if: runner.os == 'Linux' && github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage badge
        if: runner.os == 'Linux' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: deribit_data_downloader_coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.total }}%
          valColorRange: ${{ steps.coverage.outputs.total }}
          minColorRange: 50
          maxColorRange: 90
        continue-on-error: true

  docker:
    runs-on: [self-hosted, Linux, X64, muletto]
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t deribit-data-downloader .

      - name: Test Docker image
        run: docker run deribit-data-downloader --help
